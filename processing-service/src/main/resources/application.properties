spring.application.name=processing-service
server.port=8081

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/flowmetrics
spring.datasource.username=flowmetrics
spring.datasource.password=flowmetrics_dev
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway — migrations handled externally by Docker
spring.flyway.enabled=false

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=flowmetrics
spring.rabbitmq.password=flowmetrics_dev

# Logging
logging.level.com.flowmetrics=DEBUG